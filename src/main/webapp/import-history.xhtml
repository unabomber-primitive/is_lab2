<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Import History</title>
</h:head>
<h:body>
    <h:form>
        <p:menubar>
            <p:menuitem value="Home" outcome="index" />
            <p:menuitem value="Tickets" outcome="tickets" />
            <p:menuitem value="Events" outcome="events" />
            <p:menuitem value="Venues" outcome="venues" />
            <p:menuitem value="Special Operations" outcome="special" />
            <p:menuitem value="Import" outcome="import" />
            <p:menuitem value="Logout" action="#{authBean.logout()}" />
        </p:menubar>
    </h:form>

    <h1>Import History</h1>

    <h:form id="historyForm">
        <p:poll interval="5" listener="#{importHistoryBean.loadHistory}" update="historyForm"/>

        <p:dataTable value="#{importHistoryBean.history}" var="h" style="margin-top: 20px;">
            <p:column headerText="ID">
                <h:outputText value="#{h.id}"/>
            </p:column>
            <p:column headerText="Username">
                <h:outputText value="#{h.username}"/>
            </p:column>
            <p:column headerText="Timestamp">
                <h:outputText value="#{h.timestamp}"/>
            </p:column>
            <p:column headerText="Filename">
                <h:outputText value="#{h.filename}"/>
            </p:column>
            <p:column headerText="Status">
                <h:outputText value="#{h.status}"/>
            </p:column>
            <p:column headerText="Added Count">
                <h:outputText value="#{h.addedCount}"/>
            </p:column>
            <p:column headerText="Error Message">
                <h:outputText value="#{h.errorMessage}"/>
            </p:column>
        </p:dataTable>
    </h:form>
</h:body>
</html>
