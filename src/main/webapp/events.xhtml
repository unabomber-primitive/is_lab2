<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Events</title>
</h:head>
<h:body>
    <h:form>
        <p:menubar>
            <p:menuitem value="Home" outcome="index" />
            <p:menuitem value="Tickets" outcome="tickets" />
            <p:menuitem value="Venues" outcome="venues" />
            <p:menuitem value="Special Operations" outcome="special" />
            <p:menuitem value="Import" outcome="import" />
            <p:menuitem value="Import History" outcome="import-history" />
            <p:menuitem value="Logout" action="#{authBean.logout()}" />
        </p:menubar>
    </h:form>

    <h1>Events</h1>

    <h:form id="eventsForm">
        <p:messages/>

        <p:poll interval="5" listener="#{eventBean.loadEvents}" update="eventsForm"/>

        <p:commandButton value="Create New Event" onclick="PF('createEventDialog').show();" type="button"/>

        <p:dataTable value="#{eventBean.events}" var="event" style="margin-top: 20px;"
                     filteredValue="#{eventBean.filteredEvents}">
            <p:column headerText="ID" sortBy="#{event.id}">
                <h:outputText value="#{event.id}"/>
            </p:column>
            <p:column headerText="Name" sortBy="#{event.name}" filterBy="#{event.name}" filterMatchMode="exact">
                <h:outputText value="#{event.name}"/>
            </p:column>
            <p:column headerText="Description" sortBy="#{event.description}" filterBy="#{event.description}" filterMatchMode="exact">
                <h:outputText value="#{event.description}"/>
            </p:column>
            <p:column headerText="Date" sortBy="#{event.date}">
                <h:outputText value="#{event.date}"/>
            </p:column>
            <p:column headerText="Actions">
                <p:commandButton value="Edit" action="#{eventBean.setSelectedEvent(event)}"
                                 onclick="PF('editEventDialog').show();" update=":editForm"/>
                <p:commandButton value="Delete" action="#{eventBean.deleteEvent(event.id)}"
                                 update="eventsForm"/>
            </p:column>
        </p:dataTable>
    </h:form>

    <p:dialog header="Create Event" widgetVar="createEventDialog" modal="true">
        <h:form>
            <p:panelGrid columns="2">
                <h:outputLabel value="Name:"/>
                <p:inputText value="#{eventBean.newEvent.name}"/>

                <h:outputLabel value="Description:"/>
                <p:inputTextarea value="#{eventBean.newEvent.description}"/>

                <h:outputLabel value="Date:"/>
                <p:calendar value="#{eventBean.newEvent.date}" pattern="yyyy-MM-dd HH:mm:ss" showTime="true"/>
            </p:panelGrid>

            <p:commandButton value="Create" action="#{eventBean.createEvent()}"
                             update=":eventsForm" oncomplete="PF('createEventDialog').hide();"/>
        </h:form>
    </p:dialog>

    <p:dialog header="Edit Event" widgetVar="editEventDialog" modal="true">
        <h:form id="editForm">
            <p:panelGrid columns="2">
                <h:outputLabel value="Name:"/>
                <p:inputText value="#{eventBean.selectedEvent.name}"/>

                <h:outputLabel value="Description:"/>
                <p:inputTextarea value="#{eventBean.selectedEvent.description}"/>

                <h:outputLabel value="Date:"/>
                <p:calendar value="#{eventBean.selectedEvent.date}" pattern="yyyy-MM-dd HH:mm:ss" showTime="true"/>
            </p:panelGrid>

            <p:commandButton value="Update" action="#{eventBean.updateEvent()}"
                             update=":eventsForm" oncomplete="PF('editEventDialog').hide();"/>
        </h:form>
    </p:dialog>
</h:body>
</html>
