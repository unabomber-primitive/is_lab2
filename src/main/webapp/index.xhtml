<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Ticket System</title>
</h:head>
<h:body>
    <h:form rendered="#{!authBean.loggedIn}">
        <p>Please <h:link value="login" outcome="login"/> to continue.</p>
    </h:form>

    <h:form rendered="#{authBean.loggedIn}">
        <p:menubar>
            <p:menuitem value="Tickets" outcome="tickets" />
            <p:menuitem value="Events" outcome="events" />
            <p:menuitem value="Venues" outcome="venues" />
            <p:menuitem value="Special Operations" outcome="special" />
            <p:menuitem value="Import" outcome="import" />
            <p:menuitem value="Import History" outcome="import-history" />
            <p:menuitem value="Logout" action="#{authBean.logout()}" />
        </p:menubar>

        <h1>Welcome to Ticket Management System</h1>
        <p>Logged in as: #{authBean.currentUser.username} (#{authBean.currentUser.role})</p>
    </h:form>
</h:body>
</html>
